name: Deploy to GitHub Pages

# Builds the static site on every push to main and deploys it via GitHub Pages.
# The workflow can also be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages needs these two permissions to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deploy; skip queued runs in favor of the latest.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # `next build` with `output: "export"` writes here.
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
